<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>🎂 生日快乐 · 3D 星空相册</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Microsoft YaHei", "苹方", "PingFang SC", "楷体", "KaiTi", cursive, sans-serif;
    }

    body {
      background: radial-gradient(ellipse at 50% 30%, #1b1c3e 0%, #0a0a1a 70%, #030314 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 1200px;
      transform-style: preserve-3d;
      position: relative;
    }

    /* ---------- 相册容器 ---------- */
    #box {
      position: relative;
      width: 130px;
      height: 200px;
      margin: auto;
      transform-style: preserve-3d;
      transform: rotateX(-5deg) rotateY(0deg);
      z-index: 10;
      transition: transform 0.1s linear;
    }

    #box > div {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      line-height: 200px;
      font-size: 50px;
      text-align: center;
      border-radius: 4px;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
      -webkit-box-reflect: below 12px -webkit-linear-gradient(top, rgba(0,0,0,0) 30%, rgba(0,0,0,0.6) 100%);
      transform-style: preserve-3d;
      transition: transform 1s ease, box-shadow 0.3s;
      cursor: pointer;
    }

    #box > div:hover {
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.6);
    }

    /* 底部圆形光影 */
    #box .floor-shadow {
      position: absolute;
      left: 50%;
      top: 100%;
      transform: translate(-50%, -50%) rotateX(90deg) translateZ(-105px);
      width: 1200px;
      height: 1200px;
      background: radial-gradient(circle at center, rgba(255, 200, 100, 0.25) 0%, rgba(0,0,0,0) 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    /* ---------- 祝福文字 ---------- */
    .blessing {
      position: absolute;
      top: 5%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      text-align: center;
      color: #ffe9b0;
      text-shadow: 0 0 20px #f90, 0 0 40px #f90, 0 0 80px #f60;
      font-size: clamp(2rem, 8vw, 4.5rem);
      font-weight: bold;
      letter-spacing: 4px;
      animation: glow 2s ease-in-out infinite alternate;
      pointer-events: none;
      white-space: nowrap;
    }

    @keyframes glow {
      from { text-shadow: 0 0 20px #f90, 0 0 40px #f90, 0 0 80px #f60; }
      to { text-shadow: 0 0 30px #ffd, 0 0 60px #ffa, 0 0 100px #ff8c00; }
    }

    /* ---------- 音乐按钮 ---------- */
    .music-btn {
      position: absolute;
      bottom: 30px;
      left: 30px;
      z-index: 30;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 215, 0, 0.5);
      color: #ffe9b0;
      padding: 12px 25px;
      border-radius: 40px;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.3s;
      box-shadow: 0 0 20px rgba(255, 200, 0, 0.3);
      user-select: none;
    }

    .music-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      box-shadow: 0 0 30px rgba(255, 200, 0, 0.6);
      transform: scale(1.05);
    }

    .music-btn.playing {
      border-color: #ffd966;
      box-shadow: 0 0 35px #ffbb00;
    }

    /* ---------- 流星容器 ---------- */
    .stars {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 6px 2px rgba(255, 255, 200, 0.9);
      transform: rotate(-30deg);
      animation: meteor linear infinite;
      opacity: 0;
    }

    @keyframes meteor {
      0% {
        transform: translate(0, 0) rotate(-30deg);
        opacity: 1;
      }
      100% {
        transform: translate(-350px, 350px) rotate(-30deg);
        opacity: 0;
      }
    }

    /* 花瓣画布 */
    #petalCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    /* 烟花画布 */
    #fireworkCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      pointer-events: none;
    }

    /* ---------- 照片放大预览 ---------- */
    .photo-preview {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
      cursor: pointer;
      backdrop-filter: blur(5px);
    }

    .photo-preview.active {
      display: flex;
    }

    .photo-preview img {
      max-width: 85%;
      max-height: 85%;
      border-radius: 10px;
      box-shadow: 0 0 50px rgba(255, 255, 255, 0.3);
      animation: zoomIn 0.3s ease;
    }

    @keyframes zoomIn {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* 响应式调整 */
    @media (max-width: 768px) {
      #box {
        width: 100px;
        height: 160px;
      }
      .blessing {
        top: 8%;
        font-size: clamp(1.8rem, 10vw, 3rem);
        white-space: normal;
        line-height: 1.3;
      }
      .music-btn {
        bottom: 20px;
        left: 20px;
        padding: 10px 20px;
        font-size: 1rem;
      }
    }
  </style>

</head>
<body>
  <!-- 祝福标语 -->
  <div class="blessing" id="blessing"> 🎂 Myra，Happy Birthday！ 🎂 </div>

  <!-- 3D 相册容器 -->
  <div id="box">
    <div></div><div></div><div></div><div></div><div></div>
    <div></div><div></div><div></div><div></div><div></div>
    <div class="floor-shadow"></div>
  </div>

  <!-- 流星容器 -->
  <div class="stars" id="starsContainer"></div>

  <!-- 花瓣画布 -->
  <canvas id="petalCanvas"></canvas>

  <!-- 烟花画布 -->
  <canvas id="fireworkCanvas"></canvas>

  <!-- 背景音乐 -->
  <audio id="bgm" loop preload="auto">
    <source src="birthday.mp3" type="audio/mpeg">
    您的浏览器不支持音频播放。
  </audio>

  <!-- 音乐控制按钮 -->
  <div class="music-btn" id="musicBtn">🎵 点我播放生日歌</div>

  <!-- 照片放大预览层 -->
  <div class="photo-preview" id="photoPreview">
    <img src="" alt="照片预览" id="previewImg" />
  </div>

  <script>
    (function() {
      // ==================== 可配置参数 ====================
      const PHOTO_COUNT = 10;
      const PHOTO_PATH = 'img/';
      const PHOTO_EXT = '.jpg';
      const BLESS_TEXT = '🎂 Myra，Happy Birthday！ 🎂';
      const PETAL_COUNT = 30;
      const METEOR_COUNT = 25;
      const EMOJI_LIST = ['🌸', '🎂', '❤️', '✨'];

      // ==================== 初始化 3D 相册 ====================
      function initAlbum() {
        const box = document.getElementById('box');
        const divs = box.querySelectorAll('div:not(.floor-shadow)');
        const photoPreview = document.getElementById('photoPreview');
        const previewImg = document.getElementById('previewImg');

        for (let i = 0; i < divs.length; i++) {
          const div = divs[i];
          const imgUrl = `${PHOTO_PATH}${i + 1}${PHOTO_EXT}`;
          div.style.background = `url(${imgUrl}) center/cover no-repeat`;
          const angle = i * (360 / PHOTO_COUNT);
          div.style.transform = `rotateY(${angle}deg) translateZ(350px)`;
          div.style.transition = `transform 1s ${(divs.length - i) * 0.15}s ease, box-shadow 0.3s`;

          div.addEventListener('click', (e) => {
            e.stopPropagation();
            previewImg.src = imgUrl;
            photoPreview.classList.add('active');
          });
        }

        photoPreview.addEventListener('click', () => {
          photoPreview.classList.remove('active');
        });

        let isDragging = false;
        let lastX = 0, lastY = 0;
        let speedX = 0, speedY = 0;
        let rotX = -5, rotY = 0;
        let inertiaTimer = null;
        let autoRotate = true;
        let autoRotY = 0;

        function updateTransform() {
          box.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
        }

        function startAutoRotate() {
          if (!autoRotate) return;
          autoRotY += 0.15;
          rotY = autoRotY;
          updateTransform();
          requestAnimationFrame(() => {
            if (autoRotate) startAutoRotate();
          });
        }

        box.addEventListener('mousedown', (e) => {
          isDragging = true;
          autoRotate = false;
          lastX = e.clientX;
          lastY = e.clientY;
          box.style.transition = 'none';
          if (inertiaTimer) {
            clearInterval(inertiaTimer);
            inertiaTimer = null;
          }
          e.preventDefault();
        });

        window.addEventListener('mousemove', (e) => {
          if (!isDragging) return;
          const deltaX = e.clientX - lastX;
          const deltaY = e.clientY - lastY;
          rotY += deltaX * 0.3;
          rotX -= deltaY * 0.3;
          rotX = Math.max(-45, Math.min(45, rotX));
          lastX = e.clientX;
          lastY = e.clientY;
          speedX = deltaX * 0.3;
          speedY = -deltaY * 0.3;
          updateTransform();
        });

        window.addEventListener('mouseup', () => {
          if (!isDragging) return;
          isDragging = false;
          inertiaTimer = setInterval(() => {
            speedX *= 0.94;
            speedY *= 0.94;
            rotY += speedX;
            rotX += speedY;
            rotX = Math.max(-45, Math.min(45, rotX));
            updateTransform();
            if (Math.abs(speedX) < 0.05 && Math.abs(speedY) < 0.05) {
              clearInterval(inertiaTimer);
              inertiaTimer = null;
              box.style.transition = 'transform 0.8s ease';
              setTimeout(() => {
                if (!isDragging) {
                  autoRotate = true;
                  autoRotY = rotY;
                  startAutoRotate();
                }
              }, 2000);
            }
          }, 16);
        });

        box.addEventListener('touchstart', (e) => {
          isDragging = true;
          autoRotate = false;
          lastX = e.touches[0].clientX;
          lastY = e.touches[0].clientY;
          box.style.transition = 'none';
          if (inertiaTimer) clearInterval(inertiaTimer);
          e.preventDefault();
        });

        window.addEventListener('touchmove', (e) => {
          if (!isDragging) return;
          const touch = e.touches[0];
          const deltaX = touch.clientX - lastX;
          const deltaY = touch.clientY - lastY;
          rotY += deltaX * 0.4;
          rotX -= deltaY * 0.4;
          rotX = Math.max(-45, Math.min(45, rotX));
          lastX = touch.clientX;
          lastY = touch.clientY;
          speedX = deltaX * 0.4;
          speedY = -deltaY * 0.4;
          updateTransform();
        });

        window.addEventListener('touchend', () => {
          if (!isDragging) return;
          isDragging = false;
          inertiaTimer = setInterval(() => {
            speedX *= 0.94;
            speedY *= 0.94;
            rotY += speedX;
            rotX += speedY;
            rotX = Math.max(-45, Math.min(45, rotX));
            updateTransform();
            if (Math.abs(speedX) < 0.05 && Math.abs(speedY) < 0.05) {
              clearInterval(inertiaTimer);
              inertiaTimer = null;
              box.style.transition = 'transform 0.8s ease';
              setTimeout(() => {
                if (!isDragging) {
                  autoRotate = true;
                  autoRotY = rotY;
                  startAutoRotate();
                }
              }, 2000);
            }
          }, 16);
        });

        let perspectiveValue = 1200;
        document.body.style.perspective = perspectiveValue + 'px';
        window.addEventListener('wheel', (e) => {
          e.preventDefault();
          const delta = e.deltaY > 0 ? 30 : -30;
          perspectiveValue += delta;
          perspectiveValue = Math.max(400, Math.min(2500, perspectiveValue));
          document.body.style.perspective = perspectiveValue + 'px';
        }, { passive: false });

        startAutoRotate();
      }

      // ==================== 动态生成流星 ====================
      function createMeteors(count = METEOR_COUNT) {
        const container = document.getElementById('starsContainer');
        container.innerHTML = '';
        for (let i = 0; i < count; i++) {
          const star = document.createElement('div');
          star.className = 'star';
          star.style.top = (Math.random() * 30) + '%';
          star.style.left = (50 + Math.random() * 50) + '%';
          star.style.animationDuration = (1.5 + Math.random() * 2) + 's';
          star.style.animationDelay = (Math.random() * 4) + 's';
          const size = 1.5 + Math.random() * 2;
          star.style.width = size + 'px';
          star.style.height = size + 'px';
          container.appendChild(star);
        }
      }

      // ==================== 飘落花瓣 ====================
      function initPetals() {
        const canvas = document.getElementById('petalCanvas');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        const petals = [];
        const emojis = EMOJI_LIST;

        class Petal {
          constructor() {
            this.reset(true);
          }
          reset(initial = false) {
            this.x = Math.random() * width;
            this.y = initial ? Math.random() * -height : -20;
            this.size = 20 + Math.random() * 24;
            this.speedY = 1.2 + Math.random() * 2.5;
            this.speedX = -0.8 + Math.random() * 1.6;
            this.wobble = Math.random() * Math.PI * 2;
            this.wobbleSpeed = 0.02 + Math.random() * 0.05;
            this.emoji = emojis[Math.floor(Math.random() * emojis.length)];
            this.opacity = 0.75 + Math.random() * 0.25;
          }
          update() {
            this.wobble += this.wobbleSpeed;
            this.x += this.speedX + Math.sin(this.wobble) * 0.6;
            this.y += this.speedY;
            if (this.y > height + 30 || this.x < -30 || this.x > width + 30) {
              this.reset();
            }
          }
          draw(ctx) {
            ctx.save();
            ctx.font = `${this.size}px "Segoe UI Emoji", "Apple Color Emoji", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.globalAlpha = this.opacity;
            ctx.fillText(this.emoji, this.x, this.y);
            ctx.restore();
          }
        }

        for (let i = 0; i < PETAL_COUNT; i++) {
          petals.push(new Petal());
        }

        function animate() {
          ctx.clearRect(0, 0, width, height);
          for (let petal of petals) {
            petal.update();
            petal.draw(ctx);
          }
          requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener('resize', () => {
          width = window.innerWidth;
          height = window.innerHeight;
          canvas.width = width;
          canvas.height = height;
        });
      }

      // ==================== 烟花爆炸特效（全新升级版 - 粒子自带拖尾） ====================
      function initFireworks() {
        const canvas = document.getElementById('fireworkCanvas');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        const particles = [];

        // 绚烂色彩调色板
        const colorPalettes = [
          [0, 15, 30, 45, 60],
          [180, 200, 220, 240, 260],
          [280, 300, 320, 340, 360],
          [0, 60, 120, 180, 240, 300],
          [30, 40, 50, 55, 60],
          [140, 160, 170, 180, 200]
        ];

        function getRandomColor() {
          const palette = colorPalettes[Math.floor(Math.random() * colorPalettes.length)];
          const hue = palette[Math.floor(Math.random() * palette.length)];
          const saturation = 70 + Math.random() * 30;
          const lightness = 50 + Math.random() * 30;
          return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
        }

        class Particle {
          constructor(x, y, isTrail = false) {
            this.x = x;
            this.y = y;
            this.isTrail = isTrail;
            this.history = []; // 拖尾历史位置
            this.maxHistory = isTrail ? 6 : 10;

            if (isTrail) {
              const angle = Math.random() * Math.PI * 2;
              const speed = 0.5 + Math.random() * 2;
              this.vx = Math.cos(angle) * speed;
              this.vy = Math.sin(angle) * speed;
              this.size = 1 + Math.random() * 2;
              this.color = getRandomColor();
              this.life = 1;
              this.decay = 0.008 + Math.random() * 0.012;
              this.gravity = 0.02;
            } else {
              const angle = Math.random() * Math.PI * 2;
              const speed = 2 + Math.random() * 7;
              this.vx = Math.cos(angle) * speed;
              this.vy = Math.sin(angle) * speed;
              this.size = 2 + Math.random() * 5;
              this.color = getRandomColor();
              this.life = 1;
              this.decay = 0.008 + Math.random() * 0.025;
              this.gravity = 0.08 + Math.random() * 0.05;
              this.bounce = 0.6;
            }
          }

          update() {
            // 保存历史位置用于拖尾
            this.history.push({ x: this.x, y: this.y });
            if (this.history.length > this.maxHistory) {
              this.history.shift();
            }

            this.x += this.vx;
            this.y += this.vy;
            this.vy += this.gravity;
            this.vx *= 0.985;
            this.life -= this.decay;

            if (!this.isTrail) {
              if (this.x < 0 || this.x > width) {
                this.vx *= -this.bounce;
                this.x = Math.max(0, Math.min(width, this.x));
              }
              if (this.y > height) {
                this.vy *= -this.bounce;
                this.y = height;
              }
            }
          }

          draw(ctx) {
            // 绘制拖尾
            if (this.history.length > 1) {
              for (let i = 0; i < this.history.length - 1; i++) {
                const alpha = (i / this.history.length) * this.life * (this.isTrail ? 0.3 : 0.6);
                const lineWidth = (i / this.history.length) * this.size * 0.8;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.strokeStyle = this.color;
                ctx.lineWidth = Math.max(0.5, lineWidth);
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(this.history[i].x, this.history[i].y);
                ctx.lineTo(this.history[i + 1].x, this.history[i + 1].y);
                ctx.stroke();
                ctx.restore();
              }
            }

            // 绘制粒子本体
            ctx.save();
            ctx.globalAlpha = this.life * (this.isTrail ? 0.5 : 1);
            ctx.fillStyle = this.color;
            ctx.shadowBlur = this.isTrail ? 6 : 15;
            ctx.shadowColor = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }
        }

        function animate() {
          ctx.clearRect(0, 0, width, height);
          for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.update();
            p.draw(ctx);
            if (p.life <= 0) {
              particles.splice(i, 1);
            }
          }
          requestAnimationFrame(animate);
        }

        animate();

        // 点击背景空白处绽放烟花（精确触发区域判断）
        document.body.addEventListener('click', (e) => {
          const target = e.target;

          let shouldBlock = false;
          let node = target;
          while (node && node !== document.body) {
            if (node.id === 'box' || 
                node.id === 'musicBtn' || 
                node.id === 'photoPreview' ||
                node.id === 'previewImg' ||
                (node.parentElement && node.parentElement.id === 'box' && node.className !== 'floor-shadow')) {
              shouldBlock = true;
              break;
            }
            node = node.parentElement;
          }

          if (shouldBlock) return;

          const x = e.clientX;
          const y = e.clientY;

          // 80个主爆炸粒子
          for (let i = 0; i < 80; i++) {
            particles.push(new Particle(x, y, false));
          }

          // 40个拖尾粒子
          for (let i = 0; i < 40; i++) {
            particles.push(new Particle(x, y, true));
          }
        });

        window.addEventListener('resize', () => {
          width = window.innerWidth;
          height = window.innerHeight;
          canvas.width = width;
          canvas.height = height;
        });
      }

      // ==================== 音乐控制 ====================
      function initMusic() {
        const bgm = document.getElementById('bgm');
        const btn = document.getElementById('musicBtn');
        let isPlaying = false;

        btn.addEventListener('click', () => {
          if (isPlaying) {
            bgm.pause();
            btn.innerHTML = '🎵 点我播放生日歌';
            btn.classList.remove('playing');
          } else {
            bgm.play().then(() => {
              btn.innerHTML = '🎶 音乐播放中...';
              btn.classList.add('playing');
            }).catch(() => {
              alert('自动播放被浏览器阻止，请点击按钮手动播放～');
            });
          }
          isPlaying = !isPlaying;
        });

        bgm.addEventListener('play', () => {
          isPlaying = true;
          btn.innerHTML = '🎶 音乐播放中...';
          btn.classList.add('playing');
        });
        bgm.addEventListener('pause', () => {
          isPlaying = false;
          btn.innerHTML = '🎵 点我播放生日歌';
          btn.classList.remove('playing');
        });
      }

      // ==================== 启动一切 ====================
      window.addEventListener('load', () => {
        document.getElementById('blessing').textContent = BLESS_TEXT;
        initAlbum();
        createMeteors(METEOR_COUNT);
        initPetals();
        initFireworks();
        initMusic();
      });
    })();
  </script>
</body>
</html>
